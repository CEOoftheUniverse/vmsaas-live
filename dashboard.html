<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoltBot Cloud — Dashboard</title>
    <meta name="description" content="MoltBot Cloud admin dashboard. Monitor agent VMs, deploy nodes, track revenue, and manage your autonomous AI workforce.">
    <meta property="og:title" content="MoltBot Cloud Dashboard">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Outfit', sans-serif; background: #0F0F1A; color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.5rem; background: linear-gradient(135deg, #00ffd5, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { 
            background: rgba(15, 23, 42, 0.7); 
            padding: 24px; 
            border-radius: 14px; 
            border: 1px solid rgba(0, 255, 204, 0.4); 
            box-shadow: 0 8px 32px 0 rgba(0, 255, 204, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 40px 0 rgba(0, 255, 204, 0.4);
            border: 1px solid rgba(0, 255, 204, 0.8);
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; font-weight: 300; }
        button { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: all 0.2s; }
        button:hover { background: linear-gradient(135deg, #0284c7, #1d4ed8); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4); }
    </style>
    <!-- Clerk Auth Protocol (Environment Injection Required in Cloud) -->
    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_live_default_MoltBot_Tenant_Security" src="https://clerk.moltbot.com/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
</head>
<body>
    <div class="header">
        <h1>MOLTBOT CLOUD SERVER</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="index.html" style="color: #a0aec0; text-decoration: none; font-size: 0.95rem; margin-right: 15px; font-weight: 500;">Home</a>
            <a href="blog-autonomous-saas.html" style="color: #a0aec0; text-decoration: none; font-size: 0.95rem; margin-right: 15px; font-weight: 500;">Blog</a>
            <div id="auth-mount-point"></div>
            <button onclick="window.location.href='signup.html'" style="background: linear-gradient(135deg, #10b981, #059669);">Sign Up — From $49/mo</button>
            <button onclick="deployAgent()">Deploy Node</button>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Platform Metrics</h3>
            <div id="metrics-data">Loading metrics...</div>
        </div>
        <div class="card">
            <h3>Active Jobs</h3>
            <div id="jobs-data">Loading jobs...</div>
        </div>
    </div>

    <script>
        async function getClerkToken() {
            if (window.Clerk && window.Clerk.session) return await window.Clerk.session.getToken();
            return null;
        }

        async function fetchMetrics() {
            try {
                const token = await getClerkToken();
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const res = await fetch('/metrics', { headers });
                const data = await res.json();
                document.getElementById('metrics-data').innerHTML = `
                    <div class="data-row"><span>Total Revenue:</span> <span>$${data.total_revenue_usd.toFixed(2)}</span></div>
                    <div class="data-row"><span>Total Tasks:</span> <span>${data.total_jobs}</span></div>
                    <div class="data-row"><span>Active Tenants:</span> <span>${data.total_tenants}</span></div>
                `;
            } catch(e) { console.error('Error fetching metrics', e); }
        }

        async function fetchJobs() {
            // MVP: We dont have a list `/jobs` endpoint natively, just polling specific ones or showing status
            document.getElementById('jobs-data').innerHTML = `
                <div class="data-row"><span>System:</span> <span style="color:#00ffd5">Operational (Port 8080)</span></div>
                <div class="data-row"><span>MCP Server:</span> <span>GitKraken Embedded</span></div>
            `;
        }

        async function downloadCopilot() {
            try {
                const token = await getClerkToken();
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                };
                
                const res = await fetch('/checkout?plan_id=copilot&tenant_id=web_visitor', {
                    method: 'POST',
                    headers: headers,
                });
                const data = await res.json();
                
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    alert('Checkout session created (dev mode). In production, this redirects to Stripe.');
                }
            } catch(e) {
                console.error('Error initiating checkout:', e);
                alert('Payment system temporarily unavailable. Please try again.');
            }
        }

        async function deployAgent() {
            try {
                const token = await getClerkToken();
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                };
                
                await fetch('/jobs', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ task: "Dashboard triggered verification task", tenant_id: "moltbot_admin" })
                });
                alert('Job Deployment Dispatched!');
                fetchMetrics();
            } catch(e) {
                alert('Error deploying agent: ' + e.message);
            }
        }

        async function initAuth() {
            try {
                await window.Clerk.load();
                if (window.Clerk.user) {
                    const userButton = document.getElementById('auth-mount-point');
                    window.Clerk.mountUserButton(userButton);
                } else {
                    // Force auth block in production
                    console.log('Unauthenticated access blocked actively via Clerk pipeline.');
                }
            } catch(err) {
                console.error("Clerk Initialization Error: Auth servers offline.", err);
            }
        }

        fetchMetrics();
        fetchJobs();
        setInterval(fetchMetrics, 30000);
        window.addEventListener('load', initAuth);
    </script>
</body>
</html>
