<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MoltBot Cloud — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Outfit', sans-serif; background: #0F0F1A; color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.5rem; background: linear-gradient(135deg, #00ffd5, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        button { background: #0ea5e9; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 500; }
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MOLTBOT CLOUD SERVER</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="downloadCopilot()" style="background: linear-gradient(135deg, #10b981, #059669);">Download Copilot ($50/mo)</button>
            <button onclick="deployAgent()">Deploy Node</button>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Platform Metrics</h3>
            <div id="metrics-data">Loading metrics...</div>
        </div>
        <div class="card">
            <h3>Active Jobs</h3>
            <div id="jobs-data">Loading jobs...</div>
        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const res = await fetch('/metrics');
                const data = await res.json();
                document.getElementById('metrics-data').innerHTML = `
                    <div class="data-row"><span>Total Revenue:</span> <span>$${data.total_revenue_usd.toFixed(2)}</span></div>
                    <div class="data-row"><span>Total Tasks:</span> <span>${data.total_jobs}</span></div>
                    <div class="data-row"><span>Active Tenants:</span> <span>${data.total_tenants}</span></div>
                `;
            } catch(e) { console.error('Error fetching metrics', e); }
        }

        async function fetchJobs() {
            // MVP: We dont have a list `/jobs` endpoint natively, just polling specific ones or showing status
            document.getElementById('jobs-data').innerHTML = `
                <div class="data-row"><span>System:</span> <span style="color:#00ffd5">Operational (Port 8080)</span></div>
                <div class="data-row"><span>MCP Server:</span> <span>GitKraken Embedded</span></div>
            `;
        }

        async function downloadCopilot() {
            try {
                // Mock Stripe Checkout redirect
                alert('Redirecting to Stripe Checkout for $50/mo MoltBot Copilot...');
                
                // Simulate successful payment routing
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.href = '/autoagents-vscode-0.2.3.vsix';
                    link.download = 'moltbot-copilot-estel.vsix';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }, 1500);
                
            } catch(e) {
                console.error('Error initiating checkout:', e);
            }
        }

        async function deployAgent() {
            try {
                await fetch('/jobs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ task: "Dashboard triggered verification task", tenant_id: "moltbot_admin" })
                });
                alert('Job Deployment Dispatched!');
                fetchMetrics();
            } catch(e) {
                alert('Error deploying agent: ' + e.message);
            }
        }

        fetchMetrics();
        fetchJobs();
        setInterval(fetchMetrics, 30000);
    </script>
</body>
</html>
